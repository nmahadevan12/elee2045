<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Data Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .dashboard-container { margin-top: 50px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container dashboard-container">
        <h1 class="mb-4 text-center text-primary">Ambient Noise Sensors</h1>
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="card-title mb-0">Current Readings</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col">MAC Address</th>
                            <th scope="col">Last Noise Level (dB)</th>
                            <th scope="col">Last Seen (UTC)</th>
                        </tr>
                    </thead>
                    <tbody id="sensor-table-body">
                        {% for sensor in sensors %}
                        <tr>
                            <td><code>{{ sensor.mac_address }}</code></td>
                            <td>
                                <span class="badge {% if sensor.noise_level > 80 %}bg-danger{% elif sensor.noise_level > 60 %}bg-warning{% else %}bg-success{% endif %}">
                                    {{ sensor.noise_level }}
                                </span>
                            </td>
                            <td class="text-muted">{{ sensor.last_seen }}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="3" class="text-center py-4 text-muted">No sensor data available. Provide data to POST /report.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        async function fetchSensors() {
            try {
                const response = await fetch('/api/sensors');
                const sensors = await response.json();
                const tbody = document.getElementById('sensor-table-body');
                
                if (sensors.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">No sensor data available. Provide data to POST /report.</td></tr>';
                    return;
                }
                
                let html = '';
                sensors.forEach(sensor => {
                    let badgeClass = 'bg-success';
                    if (sensor.noise_level > 80) badgeClass = 'bg-danger';
                    else if (sensor.noise_level > 60) badgeClass = 'bg-warning';
                    
                    html += `
                        <tr>
                            <td><code>${sensor.mac_address}</code></td>
                            <td>
                                <span class="badge ${badgeClass}">
                                    ${sensor.noise_level}
                                </span>
                            </td>
                            <td class="text-muted">${sensor.last_seen}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (error) {
                console.error('Error fetching sensor data:', error);
            }
        }

        // Refresh every 3 seconds
        setInterval(fetchSensors, 3000);
    </script>
</body>
</html>
